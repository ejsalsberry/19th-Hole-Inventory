{% extends 'base.html' %}
{% block content %}
<h2>{{ 'Edit Product' if is_edit else 'Add Product' }}</h2>
<form method="post" class="form-grid">
  <label>Name <input name="name" value="{{ product.name if product else '' }}" required></label>
  <label>Category
    <select name="category_id" required>
      {% for c in categories %}
        <option value="{{ c.id }}" {% if product and product.category_id == c.id %}selected{% endif %}>{{ c.name }}</option>
      {% endfor %}
    </select>
  </label>
  <label>Bottle Size (oz) <input name="bottle_size_oz" type="number" step="0.01" value="{{ product.bottle_size_oz if product else '' }}" required></label>
  <label>Cost <input name="cost" type="number" step="0.01" value="{{ product.cost if product else '' }}" required></label>
  <label>Empty Bottle Weight <input name="empty_bottle_weight" type="number" step="0.01" value="{{ product.empty_bottle_weight if product else '' }}" required></label>
  <label>Full Bottle Weight <input name="full_bottle_weight" type="number" step="0.01" value="{{ product.full_bottle_weight if product else '' }}" required></label>
  <label>Pour Spout Weight (optional) <input name="pour_spout_weight" type="number" step="0.01" value="{{ product.pour_spout_weight if product and product.pour_spout_weight is not none else '' }}"></label>
  <label>Low Stock Threshold (oz) <input name="low_stock_threshold_oz" type="number" step="0.01" value="{{ product.low_stock_threshold_oz if product else '0' }}"></label>
  <label>Low Stock Threshold (unopened count) <input name="low_stock_threshold_unopened" type="number" value="{{ product.low_stock_threshold_unopened if product else '0' }}"></label>
  <label><input type="checkbox" name="uses_standard_weighing" {% if not product or product.uses_standard_weighing %}checked{% endif %}> Uses Standard Weighing Setup</label>
  <label><input type="checkbox" name="is_active" {% if not product or product.is_active %}checked{% endif %}> Active</label>
  <button type="submit">{{ 'Save Changes' if is_edit else 'Save Product' }}</button>
</form>
{% endblock %}
